<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê doanh nghiệp Laptop</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        #orderStatusChart {
            max-width: 320px;
            max-height: 320px;
        }
        #revenueChart {
            max-height: 320px;
        }
        @media (min-width: 1024px) {
            .charts-flex {
                display: flex;
                gap: 2rem;
                align-items: flex-start;
                justify-content: center;
            }
            .chart-container {
                flex: 1 1 0;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto py-8">
        <h1 class="text-3xl font-bold text-blue-700 mb-8 text-center">Thống kê tổng quan</h1>
        
        <!-- Bảng tổng hợp doanh thu và đơn hàng -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Bảng tổng hợp</h2>
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Chỉ số</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Tháng này</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Tháng trước</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Tăng/giảm</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="px-4 py-2">Tổng doanh thu</td>
                        <td class="px-4 py-2">1.250.000.000₫</td>
                        <td class="px-4 py-2">1.100.000.000₫</td>
                        <td class="px-4 py-2 text-green-600 font-bold">+13.6%</td>
                    </tr>
                    <tr>
                        <td class="px-4 py-2">Số đơn hàng</td>
                        <td class="px-4 py-2">120</td>
                        <td class="px-4 py-2">105</td>
                        <td class="px-4 py-2 text-green-600 font-bold">+14.3%</td>
                    </tr>
                    <tr>
                        <td class="px-4 py-2">Khách hàng mới</td>
                        <td class="px-4 py-2">98</td>
                        <td class="px-4 py-2">90</td>
                        <td class="px-4 py-2 text-green-600 font-bold">+8.9%</td>
                    </tr>
                    <tr>
                        <td class="px-4 py-2">Đơn bị hủy</td>
                        <td class="px-4 py-2">5</td>
                        <td class="px-4 py-2">3</td>
                        <td class="px-4 py-2 text-red-600 font-bold">+66.7%</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Bố cục 2 chart cạnh nhau trên desktop, dọc trên mobile -->
        <div class="charts-flex mb-8">
            <!-- Chart doanh thu theo tháng -->
            <div class="bg-white rounded-lg shadow p-6 mb-8 chart-container">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Biểu đồ doanh thu 6 tháng gần nhất</h2>
                <canvas id="revenueChart" width="600" height="320"></canvas>
            </div>

            <!-- Chart trạng thái đơn hàng -->
            <div class="bg-white rounded-lg shadow p-6 mb-8 chart-container">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Tỉ lệ trạng thái đơn hàng tháng này</h2>
                <div class="flex justify-center">
                    <canvas id="orderStatusChart" width="320" height="320"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script>
const revenueCanvas = document.getElementById('revenueChart');
if (revenueCanvas) {
    const revenueCtx = revenueCanvas.getContext('2d');
    new Chart(revenueCtx, {
        type: 'line',
        data: {
            labels: ['Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6', 'Tháng 7', 'Tháng 8'],
            datasets: [{
                label: 'Doanh thu (triệu đồng)',
                data: [900, 1100, 950, 1200, 1100, 1250],
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37,99,235,0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { callback: value => value + 'tr' }
                }
            }
        }
    });
}

const orderStatusCanvas = document.getElementById('orderStatusChart');
if (orderStatusCanvas) {
    const orderStatusCtx = orderStatusCanvas.getContext('2d');
    new Chart(orderStatusCtx, {
        type: 'doughnut',
        data: {
            labels: ['Đã xác nhận', 'Đang giao', 'Đã giao', 'Đã hủy', 'Đã trả hàng'],
            datasets: [{
                data: [80, 25, 10, 5, 0],
                backgroundColor: [
                    '#2563eb', // blue
                    '#fbbf24', // yellow
                    '#22c55e', // green
                    '#6b7280', // gray
                    '#ef4444'  // red
                ]
            }]
        },
        options: {
            responsive: false,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
}
</script>
</body>
</html>
