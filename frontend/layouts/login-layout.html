<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: linear-gradient(120deg, #1e293b, #334155, #64748b, #334155, #1e293b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease-in-out infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-animate {
            transition: 
                background 0.4s cubic-bezier(.4,0,.2,1),
                box-shadow 0.3s cubic-bezier(.4,0,.2,1),
                transform 0.2s cubic-bezier(.4,0,.2,1);
        }
        .btn-animate:hover {
            box-shadow: 0 8px 24px 0 rgba(59,130,246,0.25), 0 1.5px 4px 0 rgba(0,0,0,0.10);
            transform: translateY(-2px) scale(1.03);
            filter: brightness(1.1) saturate(1.2);
        }
        .btn-register-animate {
            transition: 
                background 0.4s cubic-bezier(.4,0,.2,1),
                box-shadow 0.3s cubic-bezier(.4,0,.2,1),
                transform 0.2s cubic-bezier(.4,0,.2,1);
        }
        .btn-register-animate:hover {
            box-shadow: 0 8px 24px 0 rgba(16,185,129,0.18), 0 1.5px 4px 0 rgba(0,0,0,0.10);
            transform: translateY(-2px) scale(1.03);
            filter: brightness(1.1) saturate(1.2);
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="bg-animate"></div>
    <div id="loginBox" class="w-full max-w-md bg-gray-800 bg-opacity-90 rounded-lg shadow-lg p-8 relative z-10">
        <h2 class="text-2xl font-bold text-center text-blue-400 mb-6">Đăng nhập tài khoản</h2>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1 text-gray-200">Email</label>
                <input type="email" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" required placeholder="Nhập email...">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-1 text-gray-200">Mật khẩu</label>
                <input type="password" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" required placeholder="Nhập mật khẩu...">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-700 via-indigo-700 to-gray-700 text-white py-2 rounded font-semibold shadow-md btn-animate">Đăng nhập</button>
        </form>
        <div class="mt-4 text-center text-sm text-gray-300">
            Chưa có tài khoản?
            <button id="show-register" class="text-blue-400 hover:underline focus:outline-none">Đăng ký ngay</button>
        </div>
    </div>

    <!-- Modal Đăng ký -->
    <div id="registerModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40 hidden">
      <div id="registerBox"
        class="bg-gray-800 bg-opacity-95 rounded-lg shadow-lg w-full max-w-lg mx-4 p-8 relative transform scale-95 opacity-0 transition-all duration-300">
        <button id="close-register" class="absolute top-3 right-4 text-2xl text-gray-400 hover:text-gray-200 font-bold">&times;</button>
        <h2 class="text-xl font-bold text-center text-blue-400 mb-6">Đăng ký tài khoản</h2>
        <form id="registerForm">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1 text-gray-200">Tên</label>
              <input type="text" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" required placeholder="Nhập tên...">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1 text-gray-200">Email</label>
              <input type="email" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" required placeholder="Nhập email...">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1 text-gray-200">Mật khẩu</label>
              <input type="password" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" required minlength="6" placeholder="Nhập mật khẩu...">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1 text-gray-200">Số điện thoại</label>
              <input type="text" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" placeholder="Nhập số điện thoại...">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1 text-gray-200">Địa chỉ</label>
              <input type="text" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" placeholder="Nhập địa chỉ...">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1 text-gray-200">Năm sinh</label>
              <input type="number" min="1900" max="2100" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" placeholder="Năm sinh">
            </div>
          </div>
          <button type="submit" class="w-full mt-6 bg-gradient-to-r from-green-700 via-emerald-700 to-gray-700 text-white py-2 rounded font-semibold shadow-md btn-register-animate">Đăng ký</button>
        </form>
      </div>
    </div>
    <script>
      const showRegister = document.getElementById('show-register');
      const registerModal = document.getElementById('registerModal');
      const closeRegister = document.getElementById('close-register');
      const registerBox = document.getElementById('registerBox');
      const loginBox = document.getElementById('loginBox');

      function showRegisterModal() {
        loginBox.classList.add('hidden');
        registerModal.classList.remove('hidden');
        setTimeout(() => {
          registerBox.classList.remove('scale-95', 'opacity-0');
          registerBox.classList.add('scale-100', 'opacity-100');
        }, 10);
      }
      function hideRegisterModal() {
        registerBox.classList.remove('scale-100', 'opacity-100');
        registerBox.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
          registerModal.classList.add('hidden');
          loginBox.classList.remove('hidden');
        }, 300);
      }

      showRegister.onclick = showRegisterModal;
      closeRegister.onclick = hideRegisterModal;
      registerModal.onclick = (e) => {
        if (e.target === registerModal) hideRegisterModal();
      };
      document.getElementById('registerForm').onsubmit = function(e) {
        e.preventDefault();
        alert('Đăng ký thành công (demo)');
        hideRegisterModal();
      };
    </script>
</body>
</html>
