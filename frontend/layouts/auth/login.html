<div id="loginBox" class="w-full max-w-md bg-gray-800 bg-opacity-90 rounded-lg shadow-lg p-8 relative z-10">
    <h2 class="text-2xl font-bold text-center text-blue-400 mb-6">Đăng nhập tài khoản</h2>
    <form id="loginForm">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1 text-gray-200">Email</label>
            <input type="email" id="login-email" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" required placeholder="Nhập email...">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium mb-1 text-gray-200">Mật khẩu</label>
            <input type="password" id="login-password" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-700 text-gray-100" required placeholder="Nhập mật khẩu...">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-blue-700 via-indigo-700 to-gray-700 text-white py-2 rounded font-semibold shadow-md btn-animate">Đăng nhập</button>
    </form>
    <div class="mt-4 text-center text-sm text-gray-300">
        Chưa có tài khoản?
        <button id="show-register" class="text-blue-400 hover:underline focus:outline-none">Đăng ký ngay</button>
    </div>
</div>
<script>
document.getElementById('show-register').onclick = function() {
    loadPage('auth/register.html');
};
document.getElementById('loginForm').onsubmit = function(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    fetch('http://127.0.0.1:8000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.errors) {
            alert(Object.values(data.errors).flat().join('\n'));
        } else {
            if (data.user && data.user.role === 'admin') {
                window.location.href = 'http://127.0.0.1:5500/frontend/layouts/admin-layout.html';
            } else if (data.user && data.user.role === 'user') {
                window.location.href = 'http://127.0.0.1:5500/frontend/layouts/cliend-layout.html';
            } else {
                alert('Không xác định được quyền truy cập!');
            }
        }
    })
    .catch(() => alert('Có lỗi xảy ra!'));
};
</script>
